<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>404 — Pagina non trovata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --lime:     #C8FF00;
      --lime-dim: #a8d600;
      --bg:       #f2f0ea;
      --card:     #ffffff;
      --border:   #d8d6cf;
      --text:     #1a1a16;
      --muted:    #7a7a70;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:     #0e0e0e;
        --card:   #161616;
        --border: #2a2a2a;
        --text:   #e8e8e0;
        --muted:  #888880;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Court lines texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(0,0,0,0.04) 59px, rgba(0,0,0,0.04) 60px),
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(0,0,0,0.04) 59px, rgba(0,0,0,0.04) 60px);
      pointer-events: none;
      z-index: 0;
    }

    @media (prefers-color-scheme: dark) {
      body::before {
        background-image:
          repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(200,255,0,0.03) 59px, rgba(200,255,0,0.03) 60px),
          repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(200,255,0,0.03) 59px, rgba(200,255,0,0.03) 60px);
      }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 420px;
      width: 100%;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Ball animation */
    .ball-wrap {
      position: relative;
      width: 90px;
      height: 90px;
      margin-bottom: 32px;
      animation: bounce 1.2s cubic-bezier(0.36, 0, 0.66, 0) infinite alternate;
    }

    .ball {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #e8ff60, var(--lime) 50%, var(--lime-dim));
      position: relative;
      box-shadow: 0 0 0 3px rgba(200,255,0,0.3);
    }

    /* Tennis ball seam lines */
    .ball::before,
    .ball::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.5);
    }

    .ball::before {
      width: 50px; height: 50px;
      top: -10px; left: 20px;
      clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
    }

    .ball::after {
      width: 50px; height: 50px;
      bottom: -10px; right: 20px;
      clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
    }

    .shadow {
      width: 60px;
      height: 10px;
      background: rgba(0,0,0,0.12);
      border-radius: 50%;
      margin: 0 auto;
      animation: shadow 1.2s cubic-bezier(0.36, 0, 0.66, 0) infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-40px); }
    }

    @keyframes shadow {
      from { transform: scaleX(1); opacity: 0.12; }
      to   { transform: scaleX(0.6); opacity: 0.05; }
    }

    /* 404 */
    .code {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(80px, 22vw, 110px);
      line-height: 1;
      letter-spacing: -4px;
      color: var(--lime);
      margin-bottom: 8px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(18px, 5vw, 22px);
      color: var(--text);
      margin-bottom: 16px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .desc {
      font-size: 14px;
      line-height: 1.75;
      color: var(--muted);
      max-width: 300px;
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--text);
      color: var(--bg);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.15s, opacity 0.2s;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .home-btn:hover { transform: translateY(-2px); opacity: 0.85; }

    .score {
      margin-top: 48px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeUp 0.6s 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="ball-wrap">
    <div class="ball"></div>
  </div>
  <div class="shadow"></div>

  <div class="code">404</div>
  <h1>Palla out.</h1>

  <p class="desc">
    La pagina che cerchi non esiste o è stata spostata.<br>
    Come un dritto tirato a 200 km/h — fuori dal campo.
  </p>

  <a class="home-btn" href="/">
    ← Torna alla home
  </a>

  <div class="score">Lorenzo Zantedeschi · 0 – 404</div>

</div>

</body>
</html>
